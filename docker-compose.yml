version: "3.9"

networks:
  iot-net:
    driver: bridge

volumes:
  kafka-data:
  emqx-data:

services:
  # ─────────────────────────────────────────
  # MQTT Broker (EMQX)
  # ─────────────────────────────────────────
  emqx:
    image: emqx/emqx:5.8
    container_name: emqx
    ports:
      - "1883:1883"    # MQTT
      - "8083:8083"    # MQTT over WebSocket
      - "18083:18083"  # Dashboard (admin/public)
    environment:
      EMQX_MQTT__ALLOW_ANONYMOUS: "true"
    volumes:
      - emqx-data:/opt/emqx/data
    networks:
      - iot-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "emqx", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ─────────────────────────────────────────
  # Kafka Broker (KRaft mode — no Zookeeper)
  # ─────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qg
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - iot-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ─────────────────────────────────────────
  # Kafka UI (optional – dev convenience)
  # ─────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - iot-net
    restart: unless-stopped

  # ─────────────────────────────────────────
  # MQTT → Kafka Bridge (Node.js)
  # ─────────────────────────────────────────
  mqtt-bridge:
    build:
      context: ./mqtt-bridge
      dockerfile: Dockerfile
    container_name: mqtt-bridge
    depends_on:
      kafka:
        condition: service_healthy
      emqx:
        condition: service_healthy
    environment:
      MQTT_BROKER_URL: mqtt://emqx:1883
      MQTT_TOPICS: "devices/#"
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPIC_TELEMETRY: iot.telemetry
      KAFKA_TOPIC_EVENTS: iot.events
    networks:
      - iot-net
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Microservice: Device Management (NestJS)
  # ─────────────────────────────────────────
  ms-device:
    build:
      context: ./ms-device
      dockerfile: Dockerfile
    container_name: ms-device
    depends_on:
      kafka:
        condition: service_healthy
      emqx:
        condition: service_healthy
    ports:
      - "4001:3000"
    environment:
      NODE_ENV: development
      KAFKA_BROKERS: kafka:29092
      KAFKA_GROUP_ID: ms-device-group
      KAFKA_TOPIC_TELEMETRY: iot.telemetry
      MQTT_BROKER_URL: mqtt://emqx:1883
    networks:
      - iot-net
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Microservice: Telemetry (NestJS)
  # ─────────────────────────────────────────
  ms-telemetry:
    build:
      context: ./ms-telemetry
      dockerfile: Dockerfile
    container_name: ms-telemetry
    depends_on:
      kafka:
        condition: service_healthy
      emqx:
        condition: service_healthy
    ports:
      - "4002:3000"
    environment:
      NODE_ENV: development
      KAFKA_BROKERS: kafka:29092
      KAFKA_GROUP_ID: ms-telemetry-group
      KAFKA_TOPIC_TELEMETRY: iot.telemetry
      KAFKA_TOPIC_EVENTS: iot.events
      MQTT_BROKER_URL: mqtt://emqx:1883
    networks:
      - iot-net
    restart: unless-stopped
